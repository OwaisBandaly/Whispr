global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - monitoring/alerts.yml

scrape_configs:
  - job_name: whispr-backend-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:3000

  - job_name: whispr-backend-render
    scheme: https
    metrics_path: /metrics
    authorization:
      credentials: process.env.METRICS_TOKEN
    static_configs:
      - targets:
          - https://whispr-cpwb.onrender.com
